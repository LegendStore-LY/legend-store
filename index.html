<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGEND STORE | متجر ليجند</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007bff;
            --dark-bg: #0b0f19;
            --card-bg: #151b28;
            --border: #2d333f;
            --text: #ffffff;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        /* القائمة العلوية (Header) */
        .top-nav {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .top-nav a:hover { background-color: var(--primary); }

        .main-container {
            display: flex;
            min-height: 100vh;
        }

        /* القائمة الجانبية اليسرى */
        .sidebar {
            width: 220px;
            background-color: var(--card-bg);
            border-left: 1px solid var(--border);
            padding: 20px 10px;
        }

        .sidebar-link {
            padding: 12px;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 5px;
            font-size: 14px;
            display: block;
            color: #a0aec0;
            transition: 0.3s;
            text-decoration: none;
        }

        .sidebar-link:hover { background: #1a202c; color: var(--primary); }

        .sub-menu {
            margin-right: 20px;
            display: none;
            flex-direction: column;
            gap: 5px;
            padding: 5px 0;
        }

        .sub-menu a {
            font-size: 13px;
            color: #718096;
            text-decoration: none;
            padding: 5px;
        }

        /* منطقة المحتوى */
        .content {
            flex: 1;
            padding: 30px;
        }

        /* شبكة المربعات (مثل Libya Code) */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .game-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .game-box:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .game-box img { width: 70px; border-radius: 10px; margin-bottom: 15px; }
        .game-box h3 { font-size: 16px; margin: 0; }

        /* فورم الطلب */
        .order-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 15px;
            max-width: 600px;
            margin: 0 auto;
            display: none;
        }

        label { display: block; margin-bottom: 10px; font-weight: bold; color: var(--primary); }
        select, input {
            width: 100%;
            padding: 12px;
            background: #0b0f19;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            margin-bottom: 20px;
            font-family: 'Cairo';
        }

        .submit-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .back-btn {
            color: #718096;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="#">خدمات شحن الألعاب</a>
    <a href="#">بيع وشراء حسابات</a>
    <a href="#">خدمات السوشيال ميديا</a>
    <a href="#">تأمين الحسابات</a>
</div>

<div class="main-container">
    <div class="sidebar">
        <a class="sidebar-link" href="#">🏠 طلب جديد</a>
        <div class="sidebar-link" onclick="toggleOrders()">📦 طلباتي</div>
        <div id="ordersSub" class="sub-menu">
            <a href="#">الجميع</a>
            <a href="#">نشيط</a>
            <a href="#">قيد الانتظار</a>
            <a href="#">مكتمل</a>
            <a href="#">تم الإلغاء</a>
        </div>
    </div>

    <div class="content">
        <div id="gamesGrid">
            <h2 style="margin-bottom: 25px;">اختر اللعبة المطلوبة:</h2>
            <div class="grid">
                <div class="game-box" onclick="openOrder('فري فاير')">
                    <img src="https://play-lh.googleusercontent.com/uC9m_C8Y_A_2S_Y7YvYvYvYvYvYvYvYvYvYvYvYvYvYvYvYvYvYvYvYvYvYvYvYv">
                    <h3>فري فاير</h3>
                </div>
                <div class="game-box" onclick="openOrder('ببجي موبايل')">
                    <img src="https://play-lh.googleusercontent.com/JRd0v_v_v_v_v_v_v_v_v_v_v_v_v_v_v_v_v_v_v_v_v_v_v_v_v_v_v_v_v_v_v_v">
                    <h3>ببجي موبايل</h3>
                </div>
                <div class="game-box">
                    <img src="https://is1-ssl.mzstatic.com/image/thumb/Purple211/v4/3d/8c/7e/3d8c7e9e-5e5d-5e5d-5e5d-5e5d5e5d5e5d/AppIcon-0-0-1x_U007emarketing-0-7-0-sRGB-85-220.png/512x512bb.jpg">
                    <h3>بلود سترايك</h3>
                </div>
                <div class="game-box"><h3>عضويات ببجي</h3></div>
                <div class="game-box"><h3>State of Survival</h3></div>
                <div class="game-box"><h3>ليجندز عالمي</h3></div>
            </div>
        </div>

        <div id="orderPanel" class="order-panel">
            <div class="back-btn" onclick="goBack()">🔙 العودة للرئيسية</div>
            <h2 id="gameTitle" style="color: var(--primary);">فري فاير</h2>
            
            <label>اختر الخدمة / الكمية:</label>
            <select id="serviceSelect">
                </select>

            <label>رقم المعرّف (ID):</label>
            <input type="text" id="playerID" placeholder="أدخل ID اللاعب هنا">

            <button class="submit-btn" onclick="sendWhatsApp()">إرسال الطلب الآن</button>
        </div>
    </div>
</div>

<script>
    const prices = {
        'فري فاير': [
            {n: '110 جوهرة + بونص', p: '12.5 دينار'},
            {n: '231 جوهرة + بونص', p: '24.0 دينار'},
            {n: '583 جوهرة + بونص', p: '61.0 دينار'},
            {n: '1188 جوهرة + بونص', p: '120.0 دينار'},
            {n: '2420 جوهرة + بونص', p: '235.0 دينار'}
        ],
        'ببجي موبايل': [
            {n: '60 شدة', p: '6.5 دينار'},
            {n: '325 شدة', p: '28.0 دينار'},
            {n: '660 شدة', p: '55.0 دينار'}
        ]
    };

    function toggleOrders() {
        const sub = document.getElementById('ordersSub');
        sub.style.display = (sub.style.display === 'flex') ? 'none' : 'flex';
    }

    function openOrder(game) {
        document.getElementById('gamesGrid').style.display = 'none';
        document.getElementById('orderPanel').style.display = 'block';
        document.getElementById('gameTitle').innerText = game;

        const select = document.getElementById('serviceSelect');
        select.innerHTML = '';
        prices[game].forEach(item => {
            let opt = document.createElement('option');
            opt.text = `${item.n} - السعر: ${item.p}`;
            select.add(opt);
        });
    }

    function goBack() {
        document.getElementById('gamesGrid').style.display = 'block';
        document.getElementById('orderPanel').style.display = 'none';
    }

    function sendWhatsApp() {
        const game = document.getElementById('gameTitle').innerText;
        const service = document.getElementById('serviceSelect').value;
        const id = document.getElementById('playerID').value;
        
        if(!id) { alert('الرجاء إدخال ID اللاعب'); return; }

        const message = `طلب جديد من متجر ليجند:\n🎮 اللعبة: ${game}\n💎 الخدمة: ${service}\n🆔 الآيدي: ${id}`;
        window.location.href = `https://wa.me/218934551020?text=${encodeURIComponent(message)}`;
    }
</script>

</body>
</html>
