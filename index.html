<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGEND STORE | متجر ليجند</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-color: #007bff;
            --dark-bg: #0a0e14;
            --card-bg: #161b22;
            --text-white: #ffffff;
            --accent-color: #ffcc00;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            margin: 0;
            padding: 0;
            padding-bottom: 80px;
        }

        header {
            background: linear-gradient(135deg, var(--main-color), #003d80);
            padding: 30px 20px;
            text-align: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .container {
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        .section-title {
            font-size: 22px;
            margin: 25px 0;
            border-right: 5px solid var(--main-color);
            padding-right: 15px;
            color: var(--main-color);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid #30363d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .card:hover {
            transform: scale(1.05);
            border-color: var(--main-color);
        }

        .card img {
            width: 45px;
            margin-bottom: 12px;
        }

        .card .diamonds {
            font-weight: bold;
            display: block;
            font-size: 17px;
            color: var(--accent-color);
        }

        .card .price {
            font-size: 14px;
            color: #8b949e;
            display: block;
            margin: 8px 0;
        }

        .buy-btn {
            background-color: var(--main-color);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 8px 5px;
            width: 100%;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: bold;
            font-size: 13px;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background-color: #25d366;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            z-index: 1000;
        }

        .whatsapp-float img {
            width: 35px;
        }
    </style>
</head>
<body>

<header>
    <h1>LEGEND STORE 💎</h1>
    <p>شحن فوري - أسعار منافسة - ثقة تامة</p>
</header>

<div class="container">
    <h2 class="section-title">شحن جواهر فري فاير (ID)</h2>
    
    <div class="cards-grid">
        <div class="card">
            <img src="https://img.icons8.com/color/96/diamond.png" alt="diamond">
            <span class="diamonds">110 جوهرة</span>
            <span class="price">4.50 د.ل</span>
            <button class="buy-btn" onclick="sendOrder('110 جوهرة', '4.50 د.ل')">اطلب الآن</button>
        </div>

        <div class="card">
            <img src="https://img.icons8.com/color/96/diamond.png" alt="diamond">
            <span class="diamonds">231 جوهرة</span>
            <span class="price">9.00 د.ل</span>
            <button class="buy-btn" onclick="sendOrder('231 جوهرة', '9.00 د.ل')">اطلب الآن</button>
        </div>

        <div class="card">
            <img src="https://img.icons8.com/color/96/diamond.png" alt="diamond">
            <span class="diamonds">583 جوهرة</span>
            <span class="price">18.50 د.ل</span>
            <button class="buy-btn" onclick="sendOrder('583 جوهرة', '18.50 د.ل')">اطلب الآن</button>
        </div>

        <div class="card">
            <img src="https://img.icons8.com/color/96/diamond.png" alt="diamond">
            <span class="diamonds">1188 جوهرة</span>
            <span class="price">37.00 د.ل</span>
            <button class="buy-btn" onclick="sendOrder('1188 جوهرة', '37.00 د.ل')">اطلب الآن</button>
        </div>
    </div>
</div>

<a href="https://wa.me/218934551020" class="whatsapp-float">
    <img src="https://img.icons8.com/color/48/whatsapp.png" alt="whatsapp">
</a>

<script>
    function sendOrder(item, price) {
        // سيتم التواصل مع الرقم الأول، وإذا أردت التبديل يمكنك تغيير الرقم هنا
        const phoneNumber = "218934551020"; 
        let message = `مرحباً متجر ليجند، أريد طلب:\n📌 المنتج: ${item}\n💰 السعر: ${price}\nأرجو تزويدي بطريقة الدفع.`;
        let encodedMessage = encodeURIComponent(message);
        window.location.href = `https://wa.me/${phoneNumber}?text=${encodedMessage}`;
    }
</script>

</body>
</html>
